<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Convite 15 anos</title>

<style>

body{
margin:0;
background:#021027;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:serif;
color:white;
text-align:center;
overflow:hidden;
}

#floresta{
position:absolute;
width:100%;
height:100%;
background:url("https://i.imgur.com/J5q9K6B.jpg");
background-size:cover;
}

#envelope{
width:220px;
cursor:pointer;
transition:0.4s;
}

#envelope:hover{
transform:scale(1.1);
}

#smoke{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#00ffff88,transparent);
opacity:0;
transition:1s;
}

.hidden{
display:none;
}

#convite{
font-size:22px;
}

</style>
</head>

<body>

<div id="floresta"></div>

<img id="envelope" src="https://i.imgur.com/3ZQ3Z6F.png">

<div id="smoke"></div>

<div id="convite" class="hidden">
<h1>Isadora</h1>
<p>Você está convidado para meus 15 anos</p>
<p>12 de Julho • 20h</p>
</div>

<script>

let envelope = document.getElementById("envelope")
let smoke = document.getElementById("smoke")
let convite = document.getElementById("convite")

envelope.onclick = function(){

smoke.style.opacity = 1

setTimeout(()=>{
envelope.style.display="none"
smoke.style.opacity=0
convite.classList.remove("hidden")
},3000)

}

</script>

</body>
</html>
